<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hayelci AI Arayüzü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Pulse Live Chat Entegrasyonu -->
    <script src="https://cdn.pulse.is/livechat/loader.js" data-live-chat-id="69c7a3d5b203cb8f3100d999" async></script>

    <!-- Firebase/Firestore Yer Tutucular -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        let firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {}; 
        let initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null; 

        window.historyItems = [
            { id: '1', title: 'Hayelci AI Hoş Geldiniz', date: 'Bugün' }
        ];

        window.initFirestore = async () => {
             try {
                if (Object.keys(firebaseConfig).length === 0) {
                    console.warn("Firestore: Konfigürasyon eksik.");
                    window.loadInitialHistory();
                    return;
                }
                
                const app = initializeApp(firebaseConfig);
                window.db = getFirestore(app);
                const auth = getAuth(app);
                
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                
                window.userId = auth.currentUser.uid;
                window.firebaseReady = true;
                window.loadInitialHistory(); 

            } catch (error) {
                console.error("Firestore başlatma hatası:", error);
            }
        };

        window.initFirestore();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%);
            background-color: #0a0a0a;
            border-right: 1px solid #222;
        }
        .sidebar.open { transform: translateX(0); }

        .msg-user {
            background-color: #1a1a1a; 
            color: white;
            border-radius: 18px 18px 4px 18px;
            max-width: 85%;
            padding: 12px 16px;
            margin-left: auto;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .msg-ai {
            background-color: transparent;
            color: #e5e5e5;
            max-width: 100%;
            padding: 5px 0;
            margin-right: auto;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { border-color: #666; color: #fff; }
        .action-btn.active { color: #8b5cf6; border-color: #8b5cf6; }

        .input-bar {
            background-color: #000;
            border-top: 1px solid #222;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .app-title {
            color: #8b5cf6; 
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.4rem;
        }

        .typing span {
            content: '';
            animation: blink 1.5s infinite;
            animation-fill-mode: both;
            height: 5px;
            width: 5px;
            background: #8b5cf6;
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .source-tag {
            background-color: #1a1a1a;
            color: #8b5cf6;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid #222;
            text-decoration: none;
        }
    </style>
</head>
<body class="flex h-screen flex-col">

    <!-- Modal Yapısı -->
    <div id="custom-modal" class="fixed inset-0 z-50 bg-black bg-opacity-75 hidden flex items-center justify-center p-4" onclick="hideModal()">
        <div class="bg-zinc-900 rounded-2xl p-6 w-full max-w-sm border border-zinc-800 shadow-2xl" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-xl font-bold mb-3 text-white">Başlık</h3>
            <p id="modal-message" class="text-gray-400 mb-4 text-sm leading-relaxed"></p>
            <textarea id="modal-input" class="w-full bg-zinc-800 text-white rounded-xl p-3 resize-none focus:ring-2 focus:ring-purple-500 outline-none h-24 mb-4 hidden" placeholder="Detaylar..."></textarea>
            <div id="modal-actions" class="flex justify-end gap-3"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar fixed inset-y-0 left-0 w-72 z-40 flex flex-col shadow-2xl">
        <div class="p-5 border-b border-zinc-800 flex justify-between items-center bg-black">
            <span class="text-gray-400 font-bold text-xs uppercase tracking-widest">Sohbet Geçmişi</span>
            <button onclick="toggleSidebar()" class="text-white hover:text-purple-500 transition"><i class="fas fa-times"></i></button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-3 space-y-2">
            <div class="text-center p-4 text-gray-600">Yükleniyor...</div>
        </div>
        <div class="p-4 border-t border-zinc-800 text-[10px] text-center text-gray-700 uppercase tracking-tighter">
            Hayelci AI & Live Support Hybrid v2.1
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-80 z-30 backdrop-blur-sm hidden"></div>

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 bg-black z-20 sticky top-0 border-b border-zinc-900">
        <button onclick="toggleSidebar()" class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center text-white active:scale-95 transition border border-zinc-800">
            <i class="fas fa-bars"></i>
        </button>

        <div class="app-title select-none">hayelci.ai</div>

        <button onclick="confirmNewChat()" class="w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center text-white active:scale-95 transition border border-zinc-800">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- Chat Container -->
    <div id="chat-container" class="flex-1 chat-scroll overflow-y-auto px-4 py-6 relative flex flex-col gap-6 z-10">
        <div id="welcome-screen" class="absolute inset-0 flex flex-col items-center justify-center text-center px-6">
            <div class="w-24 h-24 bg-gradient-to-br from-purple-600 to-indigo-900 rounded-3xl flex items-center justify-center mb-8 shadow-2xl rotate-3">
                <i class="fas fa-brain text-4xl text-white"></i>
            </div>
            <h2 class="text-3xl font-extrabold mb-3 bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-500">Hayelci AI'ya Hoş Geldin</h2>
            <p class="text-gray-500 text-sm max-w-xs leading-relaxed">Sana nasıl yardımcı olabilirim? Herhangi bir şey yaz veya canlı destek hattımızı kullan.</p>
        </div>
    </div>

    <div id="file-preview-area" class="px-4 hidden"></div>

    <!-- Input Bar -->
    <div class="input-bar px-4 py-4 flex items-end gap-2 z-20">
        <input type="file" id="file-input" class="hidden" accept=".txt,.pdf,.js,.py,.html,.css,.md">
        <button onclick="document.getElementById('file-input').click()" class="w-11 h-11 rounded-xl bg-zinc-900 text-gray-400 flex-shrink-0 flex items-center justify-center hover:text-white transition border border-zinc-800">
            <i class="fas fa-paperclip"></i>
        </button>

        <div class="flex-1 bg-zinc-900 rounded-2xl flex items-center px-4 relative border border-zinc-800 focus-within:border-purple-500 transition shadow-inner">
            <textarea id="user-input" rows="1" placeholder="Mesajını buraya yaz..." 
                class="w-full bg-transparent border-none text-white outline-none py-3 resize-none max-h-32 text-[15px]"
                oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; toggleSendButton();"
                onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
        </div>

        <div class="flex items-center gap-2">
            <button id="mic-btn" onclick="toggleSpeechRecognition()" class="w-11 h-11 rounded-xl bg-zinc-900 text-white flex items-center justify-center active:scale-90 transition border border-zinc-800">
                <i class="fas fa-microphone"></i>
            </button>
            
            <button id="send-btn" onclick="sendMessage()" class="w-11 h-11 rounded-xl bg-purple-600 text-white flex items-center justify-center active:scale-90 transition shadow-lg shadow-purple-600/30 hidden">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script>
        let currentChatId = null;
        let currentFileContent = "";
        let isSending = false;
        let recognition = null; 
        let isListening = false;
        let ttsActiveButton = null;
        
        const BACKEND_URL = 'http://127.0.0.1:5000'; 

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const welcomeScreen = document.getElementById('welcome-screen');
        const filePreviewArea = document.getElementById('file-preview-area');
        const modal = document.getElementById('custom-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalInput = document.getElementById('modal-input');
        const modalActions = document.getElementById('modal-actions');
        const historyList = document.getElementById('history-list');

        window.onload = () => {
            startNewChat(false);
            initializeSTT();
        };

        async function sendMessage() {
            if (isSending) return;
            const text = userInput.value.trim();
            if (!text && !currentFileContent) return;

            isSending = true;
            toggleSendButton();
            
            welcomeScreen.style.opacity = '0';
            setTimeout(() => welcomeScreen.style.display = 'none', 300);
            
            appendUserMessage(text || "Dosya analizi isteniyor...");
            const userQuery = text;
            userInput.value = '';
            userInput.style.height = 'auto';
            
            const loadingId = appendLoading();
            
            try {
                const response = await fetch(`${BACKEND_URL}/generate_ai_response`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: userQuery, file_content: currentFileContent })
                });

                removeElement(loadingId);
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.text) {
                        let aiResponse = data.text;
                        if (data.sources?.length > 0) {
                            const sourceHtml = data.sources.map((src, i) => 
                                `<a href="${src.uri}" target="_blank" class="source-tag mr-2 mt-2 inline-block"><i class="fas fa-link mr-1"></i>${i + 1}. ${src.title}</a>`
                            ).join('');
                            aiResponse += `<div class="mt-4 flex flex-wrap gap-2">${sourceHtml}</div>`;
                        }
                        appendAIMessage(aiResponse);
                    } else {
                        // YAPAY ZEKA CEVAP VEREMEDİĞİNDE BURASI ÇALIŞIR
                        appendAIMessage("Üzgünüm, bu isteğini şu an tam olarak anlayamadım veya yanıt oluştururken bir sorun yaşadım. 😔 <br><br>Alternatif olarak sağ alttaki **Canlı Destek** baloncuğundan bir ekip arkadaşımıza ulaşabilir misin?");
                    }
                } else {
                    appendAIMessage("Sana şu an cevap veremiyorum çünkü sunucum geçici olarak ulaşılamaz durumda. Lütfen daha sonra tekrar dene veya canlı destek hattımızı kullan.");
                }

            } catch (error) {
                removeElement(loadingId);
                appendAIMessage("Bağlantıda bir aksaklık oldu. Lütfen internetini kontrol et ya da teknik ekibimize canlı destek üzerinden bilgi ver.");
            }
            
            isSending = false;
            toggleSendButton();
            clearFile();
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'msg-user';
            div.innerText = text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendAIMessage(text, isError = false) {
            const container = document.createElement('div');
            container.className = 'w-full mb-2';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = isError ? 'text-red-400 msg-ai' : 'msg-ai';
            
            const formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em class="text-gray-400">$1</em>')
                .replace(/\n/g, '<br>');
            msgDiv.innerHTML = formattedText;
            
            container.appendChild(msgDiv);

            if (!isError && !text.includes('source-tag')) {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'flex gap-2 mt-3 opacity-60 hover:opacity-100 transition';
                
                const btnCopy = createActionButton('fa-regular fa-copy', () => copyToClipboard(text, btnCopy));
                const btnLike = createActionButton('fa-regular fa-thumbs-up', function() { handleLikeDislike(this, 'like'); });
                const btnTTS = createActionButton('fa-solid fa-volume-high', () => speakText(text, btnTTS));

                actionsDiv.appendChild(btnCopy);
                actionsDiv.appendChild(btnLike);
                actionsDiv.appendChild(btnTTS);
                container.appendChild(actionsDiv);
            }
            
            chatContainer.appendChild(container);
            scrollToBottom();
        }

        function createActionButton(iconClass, onClick) {
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            btn.innerHTML = `<i class="${iconClass}"></i>`;
            btn.onclick = onClick;
            return btn;
        }

        function copyToClipboard(text, btn) {
            const cleanText = text.replace(/<[^>]*>?/gm, '');
            navigator.clipboard.writeText(cleanText).then(() => {
                btn.innerHTML = '<i class="fas fa-check text-green-500"></i>';
                setTimeout(() => btn.innerHTML = '<i class="fa-regular fa-copy"></i>', 2000);
            });
        }

        function speakText(text, btn) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            if (ttsActiveButton === btn) { ttsActiveButton = null; return; }
            
            const cleanText = text.replace(/<[^>]*>?/gm, '');
            const ut = new SpeechSynthesisUtterance(cleanText);
            ut.lang = 'tr-TR';
            ut.onstart = () => { btn.classList.add('active'); ttsActiveButton = btn; };
            ut.onend = () => { btn.classList.remove('active'); ttsActiveButton = null; };
            window.speechSynthesis.speak(ut);
        }

        function initializeSTT() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new window.SpeechRecognition();
                recognition.lang = 'tr-TR';
                recognition.onresult = (e) => {
                    userInput.value = e.results[0][0].transcript;
                    toggleSendButton();
                };
                recognition.onend = () => { micBtn.classList.remove('active'); isListening = false; };
            }
        }

        function toggleSpeechRecognition() {
            if (!recognition) return;
            if (isListening) { recognition.stop(); } 
            else { recognition.start(); micBtn.classList.add('active'); isListening = true; }
        }

        function showModal(title, message, type = 'alert', callback = null) {
            modalTitle.innerText = title;
            modalMessage.innerText = message;
            modalActions.innerHTML = `<button onclick="hideModal()" class="px-5 py-2 text-sm rounded-xl bg-zinc-800 text-white font-medium hover:bg-zinc-700 transition">Kapat</button>`;
            if (type === 'confirm') {
                modalActions.innerHTML = `
                    <button onclick="hideModal()" class="px-5 py-2 text-sm rounded-xl text-gray-400 hover:bg-zinc-800 transition">İptal</button>
                    <button onclick="hideModal(); ${callback}" class="px-5 py-2 text-sm rounded-xl bg-purple-600 text-white font-medium hover:bg-purple-700">Onayla</button>
                `;
            }
            modal.classList.remove('hidden');
        }

        function hideModal() { modal.classList.add('hidden'); }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }
        function confirmNewChat() { showModal('Yeni Sohbet', 'Bu konuşmayı temizleyip yeni bir sayfa açmak istiyor musun?', 'confirm', 'startNewChat(true)'); }

        function startNewChat(isLoad = true) {
            chatContainer.innerHTML = ''; 
            chatContainer.appendChild(welcomeScreen);
            welcomeScreen.style.display = 'flex';
            welcomeScreen.style.opacity = '1';
            if (isLoad) loadInitialHistory();
        }
        
        window.loadInitialHistory = () => {
            historyList.innerHTML = '';
            window.historyItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'p-3 rounded-xl hover:bg-zinc-900 cursor-pointer text-sm border border-transparent hover:border-zinc-800 transition group flex justify-between items-center';
                div.innerHTML = `<div><div class="text-white font-medium">${item.title}</div><div class="text-xs text-gray-600">${item.date}</div></div><i class="fas fa-chevron-right text-[10px] text-gray-700 group-hover:text-purple-500"></i>`;
                div.onclick = () => { appendUserMessage("Geçmiş sohbet seçildi: " + item.title); toggleSidebar(); };
                historyList.appendChild(div);
            });
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentFileContent = e.target.result;
                filePreviewArea.innerHTML = `<div class="p-3 bg-zinc-900 rounded-xl flex items-center justify-between mb-4 border border-zinc-800 shadow-lg"><div class="flex items-center"><i class="fas fa-file-code text-purple-500 mr-3"></i><span class="text-xs text-white truncate max-w-[200px]">${file.name}</span></div><button onclick="clearFile()" class="text-gray-500 hover:text-red-500"><i class="fas fa-times"></i></button></div>`;
                filePreviewArea.classList.remove('hidden');
                toggleSendButton();
            };
            reader.readAsText(file);
        });

        function clearFile() {
            currentFileContent = "";
            document.getElementById('file-input').value = "";
            filePreviewArea.innerHTML = "";
            filePreviewArea.classList.add('hidden');
            toggleSendButton();
        }

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'msg-ai typing text-gray-600 text-xs italic';
            div.innerHTML = 'Hayelci verileri işliyor <span></span><span></span><span></span>';
            chatContainer.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeElement(id) { const el = document.getElementById(id); if (el) el.remove(); }
        function scrollToBottom() { chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }); }
        
        function toggleSendButton() {
            const inputIsEmpty = userInput.value.trim().length === 0 && currentFileContent === "";
            if (!inputIsEmpty && !isSending) {
                micBtn.classList.add('hidden');
                sendBtn.classList.remove('hidden');
            } else {
                micBtn.classList.remove('hidden');
                sendBtn.classList.add('hidden');
            }
        }

        function handleLikeDislike(btn, type) {
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            if (btn.classList.contains('active')) {
                icon.className = 'fas fa-thumbs-up text-purple-500';
            } else {
                icon.className = 'fa-regular fa-thumbs-up';
            }
        }
    </script>
</body>
</html>
